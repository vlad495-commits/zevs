<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insect Icons Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: #0A0E1A;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', sans-serif;
    padding: 40px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 40px;
  }
  .icon-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .icon-card svg {
    width: 80px;
    height: 80px;
  }
  .icon-card span {
    color: #94A3B8;
    font-size: 14px;
  }
</style>
</head>
<body>
<div class="grid">

  <!-- Таракан -->
  <div class="icon-card">
    <svg viewBox="0 0 64 64" fill="#39FF14" xmlns="http://www.w3.org/2000/svg">
      <!-- усики -->
      <path d="M26 18L22 6" stroke="#39FF14" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <path d="M38 18L42 6" stroke="#39FF14" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <!-- голова -->
      <ellipse cx="32" cy="20" rx="6" ry="5"/>
      <!-- тело -->
      <ellipse cx="32" cy="36" rx="10" ry="16"/>
      <!-- линия на спине -->
      <line x1="32" y1="22" x2="32" y2="52" stroke="#0A0E1A" stroke-width="2"/>
      <!-- лапки левые -->
      <path d="M22 28L12 22" stroke="#39FF14" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <path d="M22 36L10 36" stroke="#39FF14" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <path d="M22 44L12 50" stroke="#39FF14" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <!-- лапки правые -->
      <path d="M42 28L52 22" stroke="#39FF14" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <path d="M42 36L54 36" stroke="#39FF14" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <path d="M42 44L52 50" stroke="#39FF14" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    </svg>
    <span>Таракан</span>
  </div>

  <!-- Клоп -->
  <div class="icon-card">
    <svg viewBox="0 0 64 64" fill="#39FF14" xmlns="http://www.w3.org/2000/svg">
      <!-- усики -->
      <path d="M27 18L22 8" stroke="#39FF14" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <path d="M37 18L42 8" stroke="#39FF14" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <!-- голова -->
      <ellipse cx="32" cy="19" rx="5" ry="4"/>
      <!-- щиток (треугольник на спине) -->
      <path d="M22 24L32 38L42 24Z" fill="#39FF14"/>
      <!-- тело округлое -->
      <ellipse cx="32" cy="38" rx="14" ry="14"/>
      <!-- щиток поверх тела -->
      <path d="M22 26L32 40L42 26Z" fill="#0A0E1A" opacity="0.3"/>
      <!-- линия на спине -->
      <line x1="32" y1="24" x2="32" y2="52" stroke="#0A0E1A" stroke-width="1.5"/>
      <!-- лапки -->
      <path d="M18 30L10 24" stroke="#39FF14" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <path d="M18 38L8 38" stroke="#39FF14" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <path d="M20 46L12 52" stroke="#39FF14" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <path d="M46 30L54 24" stroke="#39FF14" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <path d="M46 38L56 38" stroke="#39FF14" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <path d="M44 46L52 52" stroke="#39FF14" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    </svg>
    <span>Клоп</span>
  </div>

  <!-- Муравей -->
  <div class="icon-card">
    <svg viewBox="0 0 64 64" fill="#39FF14" xmlns="http://www.w3.org/2000/svg">
      <!-- усики -->
      <path d="M28 14L20 4" stroke="#39FF14" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <path d="M36 14L44 4" stroke="#39FF14" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <!-- голова -->
      <ellipse cx="32" cy="16" rx="6" ry="5"/>
      <!-- грудь -->
      <ellipse cx="32" cy="28" rx="5" ry="5"/>
      <!-- брюшко -->
      <ellipse cx="32" cy="44" rx="9" ry="11"/>
      <!-- перемычка -->
      <ellipse cx="32" cy="35" rx="2.5" ry="3"/>
      <!-- лапки -->
      <path d="M27 24L14 18" stroke="#39FF14" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <path d="M27 28L12 30" stroke="#39FF14" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <path d="M27 32L14 40" stroke="#39FF14" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <path d="M37 24L50 18" stroke="#39FF14" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <path d="M37 28L52 30" stroke="#39FF14" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <path d="M37 32L50 40" stroke="#39FF14" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    </svg>
    <span>Муравей</span>
  </div>

  <!-- Муха -->
  <div class="icon-card">
    <svg viewBox="0 0 64 64" fill="#39FF14" xmlns="http://www.w3.org/2000/svg">
      <!-- крылья (большие, широко расставлены, как у настоящей мухи) -->
      <ellipse cx="14" cy="28" rx="12" ry="7" transform="rotate(-20 14 28)" opacity="0.5"/>
      <ellipse cx="50" cy="28" rx="12" ry="7" transform="rotate(20 50 28)" opacity="0.5"/>
      <!-- брюшко (крупное, яйцевидное) -->
      <ellipse cx="32" cy="40" rx="9" ry="12"/>
      <!-- полоски на брюшке -->
      <path d="M23.5 38L40.5 38" stroke="#0A0E1A" stroke-width="1.2"/>
      <path d="M24 42L40 42" stroke="#0A0E1A" stroke-width="1.2"/>
      <!-- грудь -->
      <ellipse cx="32" cy="26" rx="8" ry="6"/>
      <!-- голова -->
      <circle cx="32" cy="17" r="5.5"/>
      <!-- большие глаза (выступают за контур головы - характерная черта мухи) -->
      <circle cx="26" cy="15.5" r="4"/>
      <circle cx="38" cy="15.5" r="4"/>
      <!-- зрачки -->
      <circle cx="25" cy="14.5" r="1.5" fill="#0A0E1A"/>
      <circle cx="39" cy="14.5" r="1.5" fill="#0A0E1A"/>
      <!-- хоботок -->
      <path d="M32 22L32 26" stroke="#39FF14" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <!-- лапки (3 пары, тонкие, с изломом) -->
      <path d="M24 30L16 34L12 40" stroke="#39FF14" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <path d="M24 36L14 40L10 46" stroke="#39FF14" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <path d="M25 44L16 50L12 56" stroke="#39FF14" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <path d="M40 30L48 34L52 40" stroke="#39FF14" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <path d="M40 36L50 40L54 46" stroke="#39FF14" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <path d="M39 44L48 50L52 56" stroke="#39FF14" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>
    <span>Муха</span>
  </div>

  <!-- Блоха -->
  <div class="icon-card">
    <svg viewBox="0 0 64 64" fill="#39FF14" xmlns="http://www.w3.org/2000/svg">
      <!-- усики -->
      <path d="M30 14L26 6" stroke="#39FF14" stroke-width="2" stroke-linecap="round" fill="none"/>
      <path d="M34 14L38 6" stroke="#39FF14" stroke-width="2" stroke-linecap="round" fill="none"/>
      <!-- голова маленькая -->
      <circle cx="32" cy="16" r="4"/>
      <!-- грудь -->
      <ellipse cx="32" cy="26" rx="6" ry="6"/>
      <!-- брюшко (крупное, вытянутое вертикально - характерно для блохи) -->
      <ellipse cx="32" cy="42" rx="8" ry="12"/>
      <!-- полоски на брюшке -->
      <path d="M24 38L40 38" stroke="#0A0E1A" stroke-width="1.2" fill="none"/>
      <path d="M24 42L40 42" stroke="#0A0E1A" stroke-width="1.2" fill="none"/>
      <path d="M25 46L39 46" stroke="#0A0E1A" stroke-width="1.2" fill="none"/>
      <!-- лапки (задние длинные - характерно для блохи) -->
      <path d="M26 24L16 18" stroke="#39FF14" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <path d="M26 28L14 28" stroke="#39FF14" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <path d="M26 36L10 48" stroke="#39FF14" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <path d="M10 48L6 56" stroke="#39FF14" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <path d="M38 24L48 18" stroke="#39FF14" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <path d="M38 28L50 28" stroke="#39FF14" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <path d="M38 36L54 48" stroke="#39FF14" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <path d="M54 48L58 56" stroke="#39FF14" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    </svg>
    <span>Блоха</span>
  </div>

  <!-- Моль -->
  <div class="icon-card">
    <svg viewBox="0 0 64 64" fill="#39FF14" xmlns="http://www.w3.org/2000/svg">
      <!-- усики (перистые, характерные для моли) -->
      <path d="M29 18L22 6" stroke="#39FF14" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <path d="M22 6L18 4" stroke="#39FF14" stroke-width="1.5" stroke-linecap="round" fill="none"/>
      <path d="M22 6L20 8" stroke="#39FF14" stroke-width="1.5" stroke-linecap="round" fill="none"/>
      <path d="M35 18L42 6" stroke="#39FF14" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <path d="M42 6L46 4" stroke="#39FF14" stroke-width="1.5" stroke-linecap="round" fill="none"/>
      <path d="M42 6L44 8" stroke="#39FF14" stroke-width="1.5" stroke-linecap="round" fill="none"/>
      <!-- голова -->
      <circle cx="32" cy="20" r="4"/>
      <!-- тело -->
      <ellipse cx="32" cy="36" rx="4" ry="14"/>
      <!-- крылья верхние -->
      <path d="M28 24L8 20L18 40L28 42Z" fill="#39FF14"/>
      <path d="M36 24L56 20L46 40L36 42Z" fill="#39FF14"/>
      <!-- крылья нижние -->
      <path d="M28 40L14 50L24 52L28 46Z" fill="#39FF14" opacity="0.7"/>
      <path d="M36 40L50 50L40 52L36 46Z" fill="#39FF14" opacity="0.7"/>
      <!-- узор на крыльях -->
      <circle cx="18" cy="30" r="3" fill="#0A0E1A" opacity="0.3"/>
      <circle cx="46" cy="30" r="3" fill="#0A0E1A" opacity="0.3"/>
    </svg>
    <span>Моль</span>
  </div>

</div>
</body>
</html>
